<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 | HP公開準備フォーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="admin-page">

    <div id="login-screen">
      <div class="login-card">
        <h2>管理画面</h2>
        <p>スマートエデュケーション<br>HP公開準備フォーム</p>
        <button class="btn-google" id="login-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
      </div>
    </div>

    <div id="admin-screen">
      <header class="admin-header">
        <span class="logo">スマートエデュケーション</span>
        <h1>HP公開準備フォーム 管理画面</h1>
        <span class="spacer"></span>
        <div class="user-info">
          <span id="user-name"></span>
          <button class="btn-logout" id="logout-btn">ログアウト</button>
        </div>
      </header>
      <div class="container">
        <div class="toolbar">
          <h2>提出一覧 <span class="count-badge" id="count-badge">0件</span></h2>
          <button class="btn btn-outline" id="csv-btn">CSV出力</button>
          <button class="btn btn-primary" id="reload-btn">更新</button>
        </div>
        <div class="filter-bar">
          <select id="filter-status">
            <option value="">すべてのステータス</option>
            <option value="pending">未対応</option>
            <option value="in_progress">対応中</option>
            <option value="done">完了</option>
          </select>
          <select id="filter-risk">
            <option value="">すべてのリスク</option>
            <option value="high">高</option>
            <option value="mid">中</option>
            <option value="low">低</option>
          </select>
          <input type="text" id="filter-search" placeholder="園名で検索..." />
          <select id="filter-sort">
            <option value="submitted_desc">提出日：新しい順</option>
            <option value="submitted_asc">提出日：古い順</option>
            <option value="publish_asc">公開希望日：近い順</option>
            <option value="publish_desc">公開希望日：遠い順</option>
            <option value="garden_asc">園名：あいうえお順</option>
            <option value="status">ステータス：未対応順</option>
            <option value="risk">リスク：高い順</option>
          </select>
        </div>
        <div id="list-container">
          <div class="loading">読み込み中...</div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
